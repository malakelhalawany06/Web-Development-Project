<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale=1.0">
    <title>Reminders</title>
    <link rel="stylesheet" href=href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    <style>
    {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body 
    {
      background: #0B0E14;
      font-family: 'Sora', sans-serif;
      color: #EFF3F8;
    }
    :root {
      --bg-primary: #0B0E14;
      --bg-sidebar: #0F1219;
      --card-bg: #11161F;
      --border: #1E2530;
      --text1: #F0F3F8;
      --text2: #C9D1D9;
      --text3: #8B949E;
      --accent: #3B82F6;
      --accent3: #10B981;
      --danger: #EF4444;
      --warn: #F59E0B;
    }
    .layout {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      padding: 1.75rem 1.25rem;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
    }
    .sidebar-logo 
    {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .logo-icon 
    {
         font-size: 28px; 
    }
    .logo-text 
    {
         font-weight: 700; font-size: 1.5rem; 
    }
    .logo-text span 
    {
         color: var(--accent); 
    }
    .nav-item 
    {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      color: var(--text2);
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 6px;
      transition: 0.2s;
    }
    .nav-item:hover 
    {
      background: rgba(59,130,246,0.1);
      color: white;
    }
    .nav-item.active 
    {
      background: var(--accent);
      color: white;
    }
    .nav-icon 
    {
         font-size: 1.2rem; 
    }
    .sidebar-profile 
    {
      margin-top: auto;
      padding-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid var(--border);
    }
    .avatar 
    {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .avatar.sm 
    {
         width: 32px; height: 32px; font-size: 0.8rem; 
    }
    .profile-info .name 
    {
         font-weight: 600; font-size: 0.85rem; 
    }
    .profile-info .role 
    {
         font-size: 0.7rem; color: var(--text3); 
    }
    .main 
    {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .topbar 
    {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar-title 
    {
      font-weight: 700;
      font-size: 1.3rem;
    }
    .topbar-subtitle 
    {
      font-size: 0.75rem;
      color: var(--text3);
    }
    .avatar.small 
    {
      width: 32px;
      height: 32px;
      background: var(--accent2);
    }
     .content 
    {
      padding: 2rem;
      max-width: 900px;
    }
    .card 
    {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.5rem;
    }
    .card-header 
    {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .card-title 
    {
      font-weight: 600;
      font-size: 1.2rem;
    }
    .btn 
    {
      border: none;
      background: transparent;
      padding: 8px 16px;
      border-radius: 40px;
      font-family: 'Sora', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary 
    {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover 
    {
      background: #2563eb;
    }
     .btn-ghost 
    {
      background: rgba(255,255,255,0.05);
      color: var(--text2);
    }
     .btn-ghost:hover 
    {
      background: rgba(255,255,255,0.1);
    }
    .btn-danger 
    {
      background: rgba(239,68,68,0.15);
      color: #f87171;
    }
    .btn-danger:hover 
    {
      background: rgba(239,68,68,0.3);
    }
    .reminder-item 
    {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      background: rgba(30, 37, 48, 0.4);
      border-radius: 16px;
      margin-bottom: 8px;
      transition: 0.1s;
    }
    .reminder-item:hover 
    {
      background: #1A202C;
    }
    .reminder-check 
    {
      width: 20px;
      height: 20px;
      accent-color: var(--accent3);
      cursor: pointer;
    }
    .reminder-text 
    {
      flex: 1;
      font-weight: 500;
    }
    .reminder-text.completed 
    {
      text-decoration: line-through;
      color: var(--text3);
    }
    .delete-btn 
    {
      background: none;
      border: none;
      color: var(--text3);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 30px;
      transition: 0.2s;
    }
    .delete-btn:hover 
    {
      background: rgba(239,68,68,0.2);
      color: var(--danger);
    }
    .empty-message 
    {
      text-align: center;
      padding: 2rem;
      color: var(--text3);
    }
    .add-form 
    {
      margin-top: 1.5rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .add-form input {
      flex: 2;
      background: #0B0E14;
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 40px;
      color: white;
      font-family: 'Sora', sans-serif;
      font-size: 0.9rem;
    }
    .add-form input:focus 
    {
      outline: none;
      border-color: var(--accent);
    }
    .stats-mini 
    {
      display: flex;
      gap: 20px;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
      color: var(--text2);
      background: rgba(0,0,0,0.2);
      padding: 8px 16px;
      border-radius: 40px;
      width: fit-content;
    }
    .stats-mini span 
    {
      font-weight: 600;
      color: white;
    }
    @media (max-width: 700px) 
    {
      .sidebar 
      {
         width: 80px; padding: 1rem 0.5rem; 
      }
      .logo-text, .profile-info, .nav-item span:not(.nav-icon) 
      {
         display: none; 
      }
      .nav-item 
      {
         justify-content: center; 
      }
      .content 
      {
         padding: 1rem; 
      }
    }
  </style>

</head>

</html>
