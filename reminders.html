<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoomHub — Reminders with Priority</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --bg2:       #13161e;
      --bg3:       #1a1e2a;
      --surface:   #1f2333;
      --surface2:  #252a3a;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.13);

      --accent:    #6c8bff;
      --accent2:   #a78bfa;
      --accent3:   #34d399;
      --warn:      #fbbf24;
      --danger:    #f87171;

      --text:      #eef0f7;
      --text2:     #9499b5;
      --text3:     #5a6080;

      --radius-sm: 8px;
      --radius:    12px;
      --radius-lg: 18px;
      --radius-xl: 24px;

      --font:      'Sora', sans-serif;
      --mono:      'JetBrains Mono', monospace;

      --sidebar-w: 240px;
      --header-h:  60px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    /* ===== LAYOUT ===== */
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      padding-bottom: 1.5rem;
    }

    .sidebar-logo {
      padding: 1.25rem 1.25rem 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text span { color: var(--accent); }

    .sidebar-section {
      padding: 1rem 0.75rem 0.25rem;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 0 0.5rem;
      margin-bottom: 0.4rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.52rem 0.75rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text2);
      font-size: 13.5px;
      font-weight: 400;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
    }

    .nav-item:hover { background: var(--surface); color: var(--text); }
    .nav-item.active { background: rgba(108,139,255,0.12); color: var(--accent); font-weight: 500; }

    .nav-icon { font-size: 15px; width: 20px; text-align: center; }

    .nav-badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      border-radius: 99px;
      padding: 1px 7px;
      line-height: 1.7;
    }

    .nav-badge.green { background: var(--accent3); }
    .nav-badge.warn  { background: var(--warn); color: #1a1200; }

    /* sidebar profile */
    .sidebar-profile {
      margin-top: auto;
      padding: 0.75rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid var(--border);
      cursor: pointer;
    }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: #fff;
      flex-shrink: 0;
    }

    .avatar.sm { width: 28px; height: 28px; font-size: 11px; }
    .avatar.lg { width: 42px; height: 42px; font-size: 15px; }
    .avatar.green { background: linear-gradient(135deg, #34d399, #059669); }
    .avatar.warn  { background: linear-gradient(135deg, #fbbf24, #d97706); }
    .avatar.purple { background: linear-gradient(135deg, #a78bfa, #7c3aed); }

    .profile-info .name  { font-size: 13px; font-weight: 500; }
    .profile-info .role  { font-size: 11px; color: var(--text3); }
   
    /* ===== MAIN AREA ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* ===== TOPBAR ===== */
    .topbar {
      height: var(--header-h);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      flex-shrink: 0;
    }

    .topbar-title { font-size: 16px; font-weight: 600; }
    .topbar-subtitle { font-size: 12px; color: var(--text3); margin-top: 1px; }

    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

    .search-bar {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 0.4rem 0.75rem;
      font-size: 13px;
      color: var(--text2);
      width: 200px;
    }

    .icon-btn {
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 15px;
      color: var(--text2);
      position: relative;
      transition: background 0.15s;
    }

    .icon-btn:hover { background: var(--surface2); }

    .notif-dot {
      position: absolute;
      top: 6px; right: 6px;
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      border: 1.5px solid var(--bg2);
    }

    /* ===== CONTENT ===== */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: grid;
      gap: 1.25rem;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .card-action {
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
    }

    /* ===== STATS ROW ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-icon {
      font-size: 20px;
      margin-bottom: 2px;
    }

    .stat-val {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      font-family: var(--mono);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text2);
    }

    .stat-change {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent3);
    }

    .stat-change.warn { color: var(--warn); }

    /* ===== REMINDER LIST ===== */
    .reminders-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .reminder-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0.7rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all 0.15s;
    }

    .reminder-item:hover {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .reminder-check {
      width: 18px;
      height: 18px;
      accent-color: var(--accent3);
      cursor: pointer;
      flex-shrink: 0;
    }

    .reminder-text {
      flex: 1;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .reminder-text.completed {
      text-decoration: line-through;
      color: var(--text3);
    }

    .priority-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
      margin-left: 8px;
    }
    .priority-high { background: rgba(248,113,113,0.2); color: #f87171; }
    .priority-medium { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .priority-low { background: rgba(52,211,153,0.2); color: #34d399; }

    .delete-reminder {
      background: transparent;
      border: none;
      color: var(--text3);
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      transition: all 0.15s;
    }

    .delete-reminder:hover {
      background: rgba(248,113,113,0.15);
      color: var(--danger);
    }

    .empty-message {
      text-align: center;
      padding: 2rem;
      color: var(--text3);
      font-size: 13px;
    }

    /* Add reminder form */
    .add-reminder-form {
      display: flex;
      gap: 12px;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .add-reminder-form input,
    .add-reminder-form select {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 0.6rem 1rem;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border 0.15s;
    }

    .add-reminder-form input {
      flex: 2;
      min-width: 160px;
    }

    .add-reminder-form select {
      flex: 0 0 110px;
      cursor: pointer;
    }

    .add-reminder-form input:focus,
    .add-reminder-form select:focus {
      border-color: var(--accent);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: var(--font);
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost { background: var(--surface); border: 1px solid var(--border2); color: var(--text2); }
    .btn-ghost:hover { color: var(--text); background: var(--surface2); }

    /* Responsive */
    @media (max-width: 700px) {
      .sidebar { width: 80px; }
      .logo-text, .sidebar-label, .profile-info, .nav-item span:not(.nav-icon) { display: none; }
      .nav-item { justify-content: center; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .add-reminder-form select { flex: 1; }
    }
  </style>
</head>

</html>
