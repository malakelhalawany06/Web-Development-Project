<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
    
    <link rel="stylesheet" href="project web.css">
</head>
<body>

<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">📚</div>
      <div class="logo-text">Loom<span>Hub</span></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Overview</div>
      <a class="nav-item" href="index.html">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a class="nav-item" href="profile.html">
        <span class="nav-icon">👤</span> My Profile
      </a>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Academic</div>
      <a class="nav-item active" href="Gpa-calculator.html">
        <span class="nav-icon">🎓</span> GPA Calculator
      </a>
      <a class="nav-item" href="to-dolist.html">
        <span class="nav-icon">✅</span> To-Do List
      </a>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Collaborate</div>
      <a class="nav-item" href="project-manager.html">
        <span class="nav-icon">🗂</span> Project Manager
      </a>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <!-- TOPBAR -->
    <header class="topbar">
        <div>
            <div class="topbar-title">GPA Calculator</div>
            <div class="topbar-subtitle">University GPA System</div>
        </div>
    </header>

    <!-- CONTENT -->
    <div class="content">

        <!-- ADD COURSE -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">➕ Add Course</span>
            </div>

            <input type="text" id="courseName" placeholder="Course Name" class="btn-ghost">
            <input type="number" id="credits" placeholder="Credit Hours" class="btn-ghost">

            <select id="grade" class="btn-ghost">
                <option value="">Select Grade</option>
                <option value="4.0">A</option>
                <option value="3.7">A-</option>
                <option value="3.3">B+</option>
                <option value="3.0">B</option>
                <option value="2.7">B-</option>
                <option value="2.3">C+</option>
                <option value="2.0">C</option>
                <option value="1.0">D</option>
                <option value="0.0">F</option>
            </select>

            <button class="btn btn-primary" onclick="addCourse()">+ Add Course</button>
        </div>

        <!-- TABLE -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">📊 Courses</span>
            </div>

            <table class="gpa-table">
                <thead>
                    <tr>
                        <th>Course</th>
                        <th>Credits</th>
                        <th>Grade</th>
                        <th>Points</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="courseTable"></tbody>
            </table>

            <!-- GPA RESULT -->
            <div class="gpa-result">
                <div>
                    <div style="font-size:11px;color:var(--text3);">GPA</div>
                    <div class="gpa-val" id="gpaValue">0.00</div>
                </div>

                <div class="gpa-bar-wrap">
                    <div class="gpa-bar-fill" id="gpaBar" style="width:0%"></div>
                </div>

                <div>
                    <div style="font-size:11px;color:var(--text3);">Scale</div>
                    <div>4.0</div>
                </div>
            </div>

        </div>

    </div>
  </div>
</div>

<script src="Gpa-calculator.js"></script>

</body>
</html>
