<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Manager</title>

  <link rel="stylesheet" href="project web.css">
</head>

<body>

<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">📚</div>
      <div class="logo-text">Loom<span>Hub</span></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Overview</div>
      <a class="nav-item" href="project web trail 1.html">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a class="nav-item" href="profile.html">
        <span class="nav-icon">👤</span> My Profile
      </a>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Academic</div>
      <a class="nav-item" href="Gpa-calculator.html">
        <span class="nav-icon">🎓</span> GPA Calculator
      </a>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Collaborate</div>
      <a class="nav-item active" href="#">
        <span class="nav-icon">🗂</span> Project Manager
      </a>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
        <div>
            <div class="topbar-title">Project Manager</div>
            <div class="topbar-subtitle">Track and manage your projects</div>
        </div>
    </header>

    <!-- Content -->
    <div class="content">

        <!-- ADD TASK -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">🗂 Create Project Task</span>
            </div>

            <!-- ✅ IDs added -->
            <input type="text" id="taskName" placeholder="Task name" class="btn-ghost" style="width:100%;margin-bottom:10px;">
            <input type="text" id="assignedTo" placeholder="Assign to (member)" class="btn-ghost" style="width:100%;margin-bottom:10px;">
            <input type="date" id="deadline" class="btn-ghost" style="width:100%;margin-bottom:10px;">
            <input type="number" id="progress" placeholder="Progress %" class="btn-ghost" style="width:100%;margin-bottom:10px;">

            <!-- ✅ onclick added -->
            <button class="btn btn-primary" onclick="addTask()">+ Add Task</button>
        </div>

        <!-- TASK TABLE -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">📋 Project Tasks</span>
            </div>

            <!-- ✅ THIS is where JS will insert tasks -->
            <table class="gpa-table">
                <thead>
                    <tr>
                        <th>Task</th>
                        <th>Member</th>
                        <th>Deadline</th>
                        <th>Progress</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="taskTable"></tbody>
            </table>
        </div>

        <!-- PROJECT PROGRESS -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">📊 Project Progress</span>
            </div>

            <div style="margin-bottom:10px;">
                Overall Progress:
                <strong id="projectProgressText">0%</strong>
            </div>

            <div class="prog-bar">
                <div id="projectProgressBar" class="prog-fill fill-accent" style="width:0%"></div>
            </div>
        </div>

    </div>
  </div>
</div>


<script src="project-manager.js"></script>

</body>
</html>
