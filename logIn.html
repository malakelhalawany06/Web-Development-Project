<html>
    <head>
        <title>LoomHub — Login</title>
        <link rel="stylesheet" href="project web.css">
         <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
        <style>
            #details{
                display: flex;
                flex-direction: column;
                justify-content: center;  /* horizontal */
                align-items: center;      /* vertical */
                
            }
            input{
                
      background-color: #ffffff;
      height: 44px;
      padding: 0 1rem;
      border-radius: 14px;
      border: 1px solid #cfdde6;
      color: #0f172a;
      font-family: 'Sora', sans-serif;
      width: 20%;
      margin-bottom: 0.5rem;
      transition: 0.15s ease;
      box-sizing: border-box;
            }
            input:hover{
                outline: none;
                border-color: #3b82f6;
                box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
            }
            .main-logo{
                display:flex;
                justify-content: center;  /* horizontal */
               align-items: center;      /* vertical */
               margin-top: 70px;
               margin-bottom: 50px;
               
               
            }
            button{
                background: linear-gradient(95deg, #3b82f6, #4f46e5);
            color: white;
            box-shadow: 0 4px 8px -2px rgba(59, 130, 246, 0.3);
             display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 60px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            
            letter-spacing: 0.2px;
            }
            button:hover{
                transform: translateY(-2px);
            box-shadow: 0 8px 16px -4px rgba(59, 130, 246, 0.4);
            background: linear-gradient(95deg, #2563eb, #4338ca);
            }
        </style>
    </head>
    <body>
        <div class="main-logo"> <div class="logo-icon">📚</div>
      <div class="logo-text">Loom<span>Hub</span></div>
    </div></div>
       
        
        <div id="details">
           
            <label for="email">Email:</label><br><span id="emailError"></span>
            <input type="email" id="email" placeholder="Enter Email"><br>

            <label for="pass">Password:</label><br><span id="passError"></span>
            <input type="password" id="pass" placeholder="Enter Password"><br>

            <button>Login</button>
</div>
            



        
    </body>
</html>
